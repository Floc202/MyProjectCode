<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>White Valentine Bé Nấm ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container glassmorphism">
    <h1>💝 White Valentine 💝</h1>
    <p class="romantic-message">Cảm ơn em đã là một phần trong những ngày tháng của anh.</p>
    <div class="question">Bé Nấm có thương anh không?</div>
    <div class="buttons">
      <button id="yes-btn" class="btn yes-btn">Có ❤️</button>
      <button id="no-btn" class="btn no-btn">Không 😏</button>
    </div>
  </div>

  <div id="celebration" class="celebration hidden">
    <h2>❤️ Anh biết mà! ❤️</h2>
    <p id="typing-text" class="typing-text"></p>
    <p class="signature">White Valentine💝</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
